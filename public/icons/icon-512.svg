<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="50%" style="stop-color:#3730a3"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="41" y="41" width="430" height="430" rx="86" fill="url(#bg)"/>
  <!-- Decorative bar top -->
  <rect x="92.6" y="84" width="326.8" height="17.2" rx="8.6" fill="url(#accent)" opacity="0.8"/>
  <!-- Main "P" letter -->
  <text x="50%" y="52%" dominant-baseline="central" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="172" font-weight="700" fill="white" letter-spacing="-2">P</text>
  <!-- "Planning" subtitle -->
  <text x="50%" y="419.4" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="43" font-weight="500" fill="white" opacity="0.85" letter-spacing="3">PLANNING</text>
</svg>